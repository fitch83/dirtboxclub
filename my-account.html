<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIRTBOXCLUB. — My Account</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Boldonse&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0c0c0c;
    color: #fff;
    font-family: 'Boldonse', sans-serif;
    min-height: 100vh;
  }

  a {
    text-decoration: none;
    color: #fff;
  }

  /* Navigation */
  .nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 64px;
    background: rgba(12, 12, 12, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 2.5rem;
    z-index: 1000;
  }

  .nav-left {
    display: flex;
    align-items: center;
    gap: 2.5rem;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    height: 48px;
  }

  .nav-logo img {
    height: 48px;
    width: auto;
  }

  .nav-links {
    display: flex;
    gap: 1.8rem;
    align-items: center;
  }

  .nav-link {
    font-size: 0.95rem;
    font-family: 'Boldonse', sans-serif;
    color: #fff;
    transition: color 0.3s;
  }

  .nav-link:hover {
    color: #999;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }

  .nav-icon {
    width: 34px;
    height: 34px;
    border: 1px solid #444;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    transition: all 0.3s;
  }

  .nav-icon:hover {
    color: #e63226;
    border-color: #e63226;
  }

  .nav-icon.active {
    color: #e63226;
    border-color: #e63226;
  }

  .nav-cta {
    font-size: 0.8rem;
    padding: 0.5rem 1.3rem;
    background: #e63226;
    color: #fff;
    border-radius: 6px;
    transition: opacity 0.3s;
  }

  .nav-cta:hover {
    opacity: 0.9;
  }

  /* Main content */
  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: calc(64px + 3rem) 2.5rem 3rem;
  }

  /* Auth Forms (Login/Register) */
  .auth-page {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    margin-top: 2rem;
  }

  @media (max-width: 768px) {
    .auth-page {
      grid-template-columns: 1fr;
    }
  }

  .auth-box {
    background: #1c1c1c;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 2.5rem;
  }

  .auth-box h2 {
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
    letter-spacing: 0.05em;
  }

  .form-group {
    margin-bottom: 1.5rem;
  }

  .form-label {
    display: block;
    font-size: 0.7rem;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.6rem;
    font-weight: 600;
  }

  .form-input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    font-family: 'Boldonse', sans-serif;
    padding: 0.9rem 1.2rem;
    font-size: 0.9rem;
    transition: border-color 0.2s;
  }

  .form-input:focus {
    outline: none;
    border-color: #e63226;
  }

  .btn-primary {
    width: 100%;
    padding: 1rem;
    background: #e63226;
    border: none;
    border-radius: 6px;
    color: #fff;
    font-family: 'Boldonse', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.2s;
    font-weight: 700;
  }

  .btn-primary:hover {
    background: #d43b2f;
  }

  .form-error {
    display: none;
    background: rgba(230, 50, 38, 0.15);
    border: 1px solid #e63226;
    padding: 0.7rem 1rem;
    font-size: 0.7rem;
    color: #e63226;
    margin-bottom: 1rem;
    text-align: center;
    border-radius: 6px;
  }

  .form-error.show {
    display: block;
  }

  .toggle-link {
    text-align: center;
    margin-top: 1rem;
    font-size: 0.8rem;
    color: #999;
  }

  .toggle-link button {
    background: none;
    border: none;
    color: #e63226;
    font-family: 'Boldonse', sans-serif;
    cursor: pointer;
    text-decoration: underline;
    font-size: 0.8rem;
  }

  /* Dashboard */
  .dashboard {
    display: none;
  }

  .dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
  }

  .dashboard-header h1 {
    font-size: 2rem;
    letter-spacing: 0.05em;
  }

  .btn-logout {
    padding: 0.7rem 1.5rem;
    background: transparent;
    border: 1px solid #e63226;
    color: #e63226;
    border-radius: 6px;
    font-family: 'Boldonse', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-logout:hover {
    background: #e63226;
    color: #fff;
  }

  /* Dashboard sections */
  .dashboard-section {
    background: #1c1c1c;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 2rem;
  }

  .section-title {
    font-size: 1.3rem;
    margin-bottom: 1.5rem;
    letter-spacing: 0.05em;
    border-bottom: 1px solid #333;
    padding-bottom: 1rem;
  }

  /* Delivery Address */
  .address-display {
    background: #111;
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .address-line {
    font-size: 0.95rem;
    margin-bottom: 0.5rem;
    color: #ccc;
  }

  .btn-edit {
    padding: 0.6rem 1.2rem;
    background: #333;
    border: 1px solid #555;
    color: #fff;
    border-radius: 6px;
    font-family: 'Boldonse', sans-serif;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }

  .btn-edit:hover {
    border-color: #e63226;
    color: #e63226;
  }

  .edit-address-form {
    display: none;
    background: #111;
    border-radius: 8px;
    padding: 1.5rem;
  }

  .edit-address-form.show {
    display: block;
  }

  /* Orders Table */
  .orders-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }

  .orders-table thead {
    border-bottom: 2px solid #333;
  }

  .orders-table th {
    text-align: left;
    padding: 1rem 0;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #999;
    font-size: 0.75rem;
    text-transform: uppercase;
  }

  .orders-table td {
    padding: 1rem 0;
    border-bottom: 1px solid #2a2a2a;
  }

  .orders-table tr:hover {
    background: rgba(230, 50, 38, 0.05);
  }

  .order-id {
    color: #e63226;
    font-weight: 600;
  }

  .order-status {
    display: inline-block;
    padding: 0.4rem 0.8rem;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .status-pending {
    background: rgba(245, 158, 11, 0.15);
    color: #f59e0b;
    border: 1px solid rgba(245, 158, 11, 0.3);
  }

  .status-processing {
    background: rgba(59, 130, 246, 0.15);
    color: #3b82f6;
    border: 1px solid rgba(59, 130, 246, 0.3);
  }

  .status-shipped {
    background: rgba(34, 197, 94, 0.15);
    color: #22c55e;
    border: 1px solid rgba(34, 197, 94, 0.3);
  }

  .status-delivered {
    background: rgba(34, 197, 94, 0.15);
    color: #22c55e;
    border: 1px solid rgba(34, 197, 94, 0.3);
  }

  .btn-track {
    padding: 0.5rem 1rem;
    background: #e63226;
    border: none;
    color: #fff;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Boldonse', sans-serif;
    font-size: 0.75rem;
    transition: opacity 0.2s;
  }

  .btn-track:hover {
    opacity: 0.9;
  }

  .no-orders {
    text-align: center;
    padding: 2rem;
    color: #999;
    font-size: 0.95rem;
  }

  /* Loyalty Points */
  .loyalty-card {
    background: linear-gradient(135deg, rgba(230, 50, 38, 0.2) 0%, rgba(230, 50, 38, 0.05) 100%);
    border: 1px solid rgba(230, 50, 38, 0.3);
    border-radius: 12px;
    padding: 2rem;
    text-align: center;
  }

  .loyalty-points {
    font-size: 3rem;
    font-weight: 700;
    color: #e63226;
    margin-bottom: 0.5rem;
  }

  .loyalty-label {
    font-size: 0.8rem;
    color: #999;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .loyalty-info {
    font-size: 0.8rem;
    color: #777;
    margin-top: 1rem;
  }

  .loading {
    text-align: center;
    padding: 2rem;
    color: #999;
  }

  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.8);
    z-index: 2000;
    align-items: center;
    justify-content: center;
  }

  .modal.show {
    display: flex;
  }

  .modal-content {
    background: #1c1c1c;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 2rem;
    max-width: 500px;
    width: 90%;
  }

  .modal-content h3 {
    margin-bottom: 1.5rem;
  }

  .modal-close {
    display: block;
    margin-left: auto;
    background: none;
    border: none;
    color: #999;
    cursor: pointer;
    font-size: 1.5rem;
    margin-bottom: 1rem;
  }

  .modal-close:hover {
    color: #e63226;
  }

  .btn-secondary {
    width: 100%;
    padding: 0.8rem;
    background: #333;
    border: 1px solid #555;
    color: #fff;
    border-radius: 6px;
    font-family: 'Boldonse', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 1rem;
  }

  .btn-secondary:hover {
    background: #444;
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <a href="index.html" class="nav-logo"><img src="assets/logo-nav-grid.png" alt="DIRTBOXCLUB" style="height:48px;width:auto"></a>
  </div>
  <div class="nav-right">

<div class="container">

  <!-- Auth Page (Login/Register) -->
  <div id="auth-page" class="auth-page">
    <!-- Login Form -->
    <div class="auth-box">
      <h2>Sign In</h2>
      <div class="form-error" id="login-error"></div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="login-email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="handleLogin()">Sign In</button>
      <div class="toggle-link">
        Don't have an account? <button onclick="toggleRegister()">Create one</button>
      </div>
    </div>

    <!-- Register Form -->
    <div class="auth-box">
      <h2>Create Account</h2>
      <div class="form-error" id="register-error"></div>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-input" id="register-name" placeholder="Your Name">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="register-email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="register-password" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="handleRegister()">Create Account</button>
      <div class="toggle-link">
        Have an account? <button onclick="toggleRegister()">Sign in instead</button>
      </div>
    </div>
  </div>

  <!-- Dashboard (shown after login) -->
  <div id="dashboard" class="dashboard">
    <div class="dashboard-header">
      <div>
        <h1>My Account</h1>
        <p style="color: #999; margin-top: 0.3rem; font-size: 0.9rem;" id="user-greeting"></p>
      </div>
      <button class="btn-logout" onclick="handleLogout()">Logout</button>
    </div>

    <!-- Loyalty Points -->
    <div class="dashboard-section">
      <div class="loyalty-card">
        <div class="loyalty-points" id="loyalty-points">0</div>
        <div class="loyalty-label">Loyalty Points</div>
        <div class="loyalty-info">1 point per £1 spent</div>
      </div>
    </div>

    <!-- Order History -->
    <div class="dashboard-section">
      <h2 class="section-title">Order History</h2>
      <div id="orders-container">
        <div class="loading">Loading your orders...</div>
      </div>
    </div>

    <!-- Saved Delivery Address -->
    <div class="dashboard-section">
      <h2 class="section-title">Delivery Address</h2>
      <div id="address-display" class="address-display">
        <div class="address-line">No address saved</div>
      </div>
      <button class="btn-edit" onclick="toggleEditAddress()">Edit Address</button>
      <form class="edit-address-form" id="edit-address-form" onsubmit="handleSaveAddress(event)">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="addr-name" placeholder="Full Name">
        </div>
        <div class="form-group">
          <label class="form-label">Street Address</label>
          <input type="text" class="form-input" id="addr-street" placeholder="123 Main St">
        </div>
        <div class="form-group">
          <label class="form-label">City</label>
          <input type="text" class="form-input" id="addr-city" placeholder="City">
        </div>
        <div class="form-group">
          <label class="form-label">Postcode</label>
          <input type="text" class="form-input" id="addr-postcode" placeholder="AB12 3CD">
        </div>
        <div class="form-group">
          <label class="form-label">Country</label>
          <input type="text" class="form-input" id="addr-country" placeholder="United Kingdom">
        </div>
        <button type="submit" class="btn-primary">Save Address</button>
        <button type="button" class="btn-secondary" onclick="toggleEditAddress()">Cancel</button>
      </form>
    </div>
  </div>

</div>

<!-- Order Details Modal -->
<div class="modal" id="order-modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeOrderModal()">&times;</button>
    <h3 id="modal-order-ref"></h3>
    <div id="modal-order-details"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore,
    collection,
    doc,
    setDoc,
    getDoc,
    query,
    where,
    getDocs,
    updateDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDgpvF9rIy44h4whE7mon7m0mD-bV21kEg",
    authDomain: "dirtboxclub-3d7a7.firebaseapp.com",
    projectId: "dirtboxclub-3d7a7",
    storageBucket: "dirtboxclub-3d7a7.firebasestorage.app",
    messagingSenderId: "883493757389",
    appId: "1:883493757389:web:749f668e2655fd168fe484"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // EmailJS config for welcome emails
  const EMAILJS_PUBLIC_KEY = 'Se-YqzqLV7Zr-AYVt';
  const EMAILJS_SERVICE_ID = 'service_hpy2gvj';

  let currentUser = null;

  // Initialize
  window.addEventListener('DOMContentLoaded', () => {
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        await showDashboard(user);
      } else {
        currentUser = null;
        showAuthPage();
      }
    });
  });

  function showAuthPage() {
    document.getElementById('auth-page').style.display = 'grid';
    document.getElementById('dashboard').style.display = 'none';
  }

  async function showDashboard(user) {
    document.getElementById('auth-page').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    try {
      const customerDoc = await getDoc(doc(db, 'customers', user.uid));
      const customerData = customerDoc.data() || {};

      document.getElementById('user-greeting').textContent = `Welcome back, ${customerData.name || 'Customer'}`;

      // Load loyalty points
      await loadLoyaltyPoints(user.email);

      // Load orders
      await loadOrders(user.email);

      // Load address
      displayAddress(customerData.deliveryAddress || null);
    } catch (e) {
      console.error('Error loading dashboard:', e);
    }
  }

  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('login-error');

    if (!email || !password) {
      errorEl.textContent = 'Email and password required';
      errorEl.classList.add('show');
      return;
    }

    try {
      errorEl.classList.remove('show');
      await signInWithEmailAndPassword(auth, email, password);
    } catch (err) {
      errorEl.textContent = err.message || 'Login failed. Try again.';
      errorEl.classList.add('show');
    }
  }

  async function handleRegister() {
    const name = document.getElementById('register-name').value.trim();
    const email = document.getElementById('register-email').value.trim();
    const password = document.getElementById('register-password').value;
    const errorEl = document.getElementById('register-error');

    if (!name || !email || !password) {
      errorEl.textContent = 'All fields required';
      errorEl.classList.add('show');
      return;
    }

    try {
      errorEl.classList.remove('show');
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      // Create customer record in Firestore
      await setDoc(doc(db, 'customers', user.uid), {
        email: email,
        name: name,
        createdAt: serverTimestamp(),
        deliveryAddress: null,
        loyaltyPoints: 0
      });

      // Send welcome email via EmailJS
      await sendWelcomeEmail(name, email);

      // Clear form
      document.getElementById('register-name').value = '';
      document.getElementById('register-email').value = '';
      document.getElementById('register-password').value = '';

    } catch (err) {
      errorEl.textContent = err.message || 'Registration failed. Try again.';
      errorEl.classList.add('show');
    }
  }

  async function sendWelcomeEmail(name, email) {
    try {
      const response = await fetch('https://api.emailjs.com/api/v1.0/email/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          service_id: EMAILJS_SERVICE_ID,
          template_id: 'template_welcome',
          user_id: EMAILJS_PUBLIC_KEY,
          template_params: {
            to_email: email,
            to_name: name
          }
        })
      });

      if (!response.ok) {
        console.warn('Welcome email failed to send');
      }
    } catch (err) {
      console.warn('Welcome email error:', err);
    }
  }

  async function handleLogout() {
    try {
      await signOut(auth);
      showAuthPage();
      document.getElementById('login-email').value = '';
      document.getElementById('login-password').value = '';
    } catch (err) {
      console.error('Logout error:', err);
    }
  }

  async function loadLoyaltyPoints(email) {
    try {
      const ordersQuery = query(collection(db, 'orders'), where('customerEmail', '==', email));
      const ordersSnap = await getDocs(ordersQuery);

      let totalPoints = 0;
      ordersSnap.forEach(doc => {
        const order = doc.data();
        const total = parseFloat(order.total || 0);
        totalPoints += Math.floor(total);
      });

      document.getElementById('loyalty-points').textContent = totalPoints;
    } catch (err) {
      console.error('Error loading loyalty points:', err);
    }
  }

  async function loadOrders(email) {
    try {
      const ordersQuery = query(collection(db, 'orders'), where('customerEmail', '==', email));
      const ordersSnap = await getDocs(ordersQuery);

      if (ordersSnap.empty) {
        document.getElementById('orders-container').innerHTML = '<div class="no-orders">No orders yet. <a href="shop.html" style="color: #e63226;">Start shopping</a></div>';
        return;
      }

      let html = '<table class="orders-table"><thead><tr><th>Order ID</th><th>Date</th><th>Status</th><th>Total</th><th></th></tr></thead><tbody>';

      ordersSnap.forEach(doc => {
        const order = doc.data();
        const date = order.createdAt ? new Date(order.createdAt.seconds * 1000).toLocaleDateString('en-GB') : 'N/A';
        const status = order.status || 'pending';

        html += `
          <tr>
            <td><span class="order-id">${order.ref || doc.id}</span></td>
            <td>${date}</td>
            <td><span class="order-status status-${status}">${status}</span></td>
            <td>£${parseFloat(order.total || 0).toFixed(2)}</td>
            <td><button class="btn-track" onclick="showOrderDetails('${doc.id}', '${order.ref}')">View</button></td>
          </tr>
        `;
      });

      html += '</tbody></table>';
      document.getElementById('orders-container').innerHTML = html;
    } catch (err) {
      console.error('Error loading orders:', err);
      document.getElementById('orders-container').innerHTML = '<div class="loading" style="color: #e63226;">Error loading orders</div>';
    }
  }

  function displayAddress(address) {
    const display = document.getElementById('address-display');
    if (!address || !address.name) {
      display.innerHTML = '<div class="address-line">No address saved yet</div>';
      return;
    }

    display.innerHTML = `
      <div class="address-line"><strong>${address.name}</strong></div>
      <div class="address-line">${address.street}</div>
      <div class="address-line">${address.city}, ${address.postcode}</div>
      <div class="address-line">${address.country}</div>
    `;

    // Populate form for editing
    document.getElementById('addr-name').value = address.name || '';
    document.getElementById('addr-street').value = address.street || '';
    document.getElementById('addr-city').value = address.city || '';
    document.getElementById('addr-postcode').value = address.postcode || '';
    document.getElementById('addr-country').value = address.country || '';
  }

  function toggleEditAddress() {
    document.getElementById('edit-address-form').classList.toggle('show');
  }

  async function handleSaveAddress(e) {
    e.preventDefault();

    if (!currentUser) return;

    const address = {
      name: document.getElementById('addr-name').value,
      street: document.getElementById('addr-street').value,
      city: document.getElementById('addr-city').value,
      postcode: document.getElementById('addr-postcode').value,
      country: document.getElementById('addr-country').value
    };

    try {
      await updateDoc(doc(db, 'customers', currentUser.uid), {
        deliveryAddress: address
      });

      displayAddress(address);
      toggleEditAddress();
    } catch (err) {
      console.error('Error saving address:', err);
    }
  }

  window.showOrderDetails = async function(docId, orderRef) {
    try {
      const orderDoc = await getDoc(doc(db, 'orders', docId));
      if (!orderDoc.exists()) return;

      const order = orderDoc.data();
      document.getElementById('modal-order-ref').textContent = `Order ${order.ref || orderRef}`;

      let html = `
        <div style="font-size: 0.9rem; color: #ccc;">
          <div style="margin-bottom: 1rem;"><strong>Status:</strong> <span class="order-status status-${order.status || 'pending'}">${order.status || 'pending'}</span></div>
          <div style="margin-bottom: 1rem;"><strong>Total:</strong> £${parseFloat(order.total || 0).toFixed(2)}</div>
      `;

      if (order.items && order.items.length > 0) {
        html += '<div style="margin-bottom: 1rem;"><strong>Items:</strong><ul style="margin: 0.5rem 0 0 1.5rem;">';
        order.items.forEach(item => {
          html += `<li>${item.name} (x${item.qty}${item.size ? ', ' + item.size : ''}) - £${(item.price * item.qty).toFixed(2)}</li>`;
        });
        html += '</ul></div>';
      }

      html += `
        <div style="margin-bottom: 1rem;"><strong>Shipping Address:</strong><div style="margin-top: 0.5rem; color: #999;">
          ${order.customerName}<br>
          ${order.shippingAddress ? order.shippingAddress.street + '<br>' + order.shippingAddress.city + '<br>' + order.shippingAddress.postcode : 'Not available'}
        </div></div>
      </div>
      `;

      document.getElementById('modal-order-details').innerHTML = html;
      document.getElementById('order-modal').classList.add('show');
    } catch (err) {
      console.error('Error loading order:', err);
    }
  };

  window.closeOrderModal = function() {
    document.getElementById('order-modal').classList.remove('show');
  };

  window.toggleRegister = function() {
    const authPage = document.getElementById('auth-page');
    const boxes = authPage.querySelectorAll('.auth-box');
    boxes[0].style.display = boxes[0].style.display === 'none' ? 'block' : 'none';
    boxes[1].style.display = boxes[1].style.display === 'none' ? 'block' : 'none';
  };
</script>
