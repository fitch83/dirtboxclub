<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIRTBOXCLUB. — Admin Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Boldonse&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0c0c0c;
      color: #fff;
      font-family: 'Boldonse', sans-serif;
      line-height: 1.6;
      font-size: 0.9rem;
    }

    /* HEADER */
    .header {
      background: #0c0c0c;
      border-bottom: 1px solid #2a2a2a;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .back-arrow {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0;
    }

    .header-content h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin: 0;
    }

    .header-content p {
      font-size: 0.75rem;
      color: #777;
      letter-spacing: 0.05em;
      margin: 0.2rem 0 0 0;
    }

    .header-right {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    /* TAB BAR */
    .tab-bar {
      display: flex;
      gap: 0.5rem;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid #2a2a2a;
      background: #0c0c0c;
      overflow-x: auto;
      white-space: nowrap;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: transparent;
      border: none;
      color: #777;
      font-family: 'Boldonse', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }

    .tab-btn:hover {
      color: #fff;
    }

    .tab-btn.active {
      background: #e63226;
      color: #fff;
    }

    /* MAIN CONTAINER */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* SECTION HEADER */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
    }

    .section-title h2 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin: 0;
    }

    .section-title p {
      font-size: 0.75rem;
      color: #777;
      letter-spacing: 0.05em;
      margin: 0.3rem 0 0 0;
    }

    /* BUTTONS */
    .btn {
      padding: 0.6rem 1.2rem;
      background: #e63226;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s;
      font-family: 'Boldonse', sans-serif;
      text-transform: uppercase;
    }

    .btn:hover {
      background: #d42118;
    }

    .btn-outlined {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #999;
    }

    .btn-outlined:hover {
      color: #fff;
      border-color: #666;
    }

    .btn-icon {
      background: none;
      border: none;
      color: #999;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.3rem;
      transition: color 0.2s;
    }

    .btn-icon:hover {
      color: #fff;
    }

    .btn-icon.delete {
      color: #e63226;
    }

    .btn-icon.delete:hover {
      color: #d42118;
    }

    /* TAB CONTENT */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* PRODUCT GRID */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .product-card {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .product-image {
      width: 100%;
      aspect-ratio: 1.2;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: #666;
      overflow: hidden;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-info {
      padding: 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .product-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.5rem;
    }

    .product-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
    }

    .product-price {
      font-size: 0.9rem;
      font-weight: 700;
      color: #e63226;
    }

    .product-desc {
      font-size: 0.7rem;
      color: #777;
      margin-bottom: 0.8rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    .product-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: #777;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #2a2a2a;
    }

    .product-actions {
      display: flex;
      gap: 0.5rem;
    }

    .product-edit-btn {
      flex: 1;
      padding: 0.5rem;
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #999;
      border-radius: 6px;
      font-size: 0.65rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Boldonse', sans-serif;
    }

    .product-edit-btn:hover {
      border-color: #666;
      color: #fff;
    }

    /* CARDS */
    .card {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card-title {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }

    /* MEMBER CARD LIST */
    .member-card {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 1.2rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .member-info {
      flex: 1;
    }

    .member-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.3rem;
    }

    .member-detail {
      font-size: 0.7rem;
      color: #777;
      margin: 0.2rem 0;
    }

    .member-icon {
      font-size: 1.3rem;
      color: #777;
    }

    /* STAT CARDS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 1.5rem;
    }

    .stat-icon {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .stat-label {
      font-size: 0.65rem;
      color: #777;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
    }

    /* ANALYTICS GRID */
    .analytics-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .analytics-full {
      display: block;
    }

    /* ACTIVITY LOG */
    .activity-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid #2a2a2a;
    }

    .activity-item:last-child {
      border-bottom: none;
    }

    .activity-info {
      flex: 1;
    }

    .activity-time {
      font-size: 0.7rem;
      color: #777;
    }

    .activity-type {
      font-size: 0.65rem;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-weight: 600;
      margin-top: 0.3rem;
    }

    .activity-type.page-view {
      background: rgba(70, 130, 220, 0.2);
      color: #4682dc;
    }

    .activity-type.time-on-page {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .activity-path {
      font-size: 0.7rem;
      color: #999;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      color: #777;
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .empty-title {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .empty-desc {
      font-size: 0.75rem;
      color: #777;
      margin-bottom: 1.5rem;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    /* APPLICATION CARD */
    .application-card {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .application-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 1rem;
    }

    .application-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
    }

    .application-meta {
      font-size: 0.7rem;
      color: #777;
      margin-top: 0.3rem;
    }

    .application-actions {
      display: flex;
      gap: 0.5rem;
    }

    .application-btn {
      padding: 0.4rem 0.8rem;
      font-size: 0.65rem;
      font-weight: 600;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: 'Boldonse', sans-serif;
      text-transform: uppercase;
    }

    .application-btn.approve {
      background: #22c55e;
      color: #fff;
    }

    .application-btn.approve:hover {
      background: #16a34a;
    }

    .application-btn.reject {
      background: #ef4444;
      color: #fff;
    }

    .application-btn.reject:hover {
      background: #dc2626;
    }

    /* LIST */
    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 0;
      border-bottom: 1px solid #2a2a2a;
      font-size: 0.75rem;
    }

    .list-item:last-child {
      border-bottom: none;
    }

    .list-label {
      color: #999;
    }

    .list-value {
      color: #fff;
      font-weight: 600;
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .product-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .analytics-2col {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .product-grid {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .header {
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
      }

      .header-right {
        width: 100%;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <button class="back-arrow" onclick="window.location='index.html'">←</button>
      <div class="header-content">
        <h1>Admin Dashboard</h1>
        <p>Manage products, applications, and members</p>
      </div>
    </div>
    <div class="header-right">
      <button id="add-product-btn" class="btn" style="display: none;" onclick="openProductModal()">+ Add Product</button>
      <button class="btn btn-outlined" onclick="logout()">Logout</button>
    </div>
  </header>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('products', this)">📦 Products</button>
    <button class="tab-btn" onclick="switchTab('applications', this)">📋 Applications</button>
    <button class="tab-btn" onclick="switchTab('members', this)">👥 Members</button>
    <button class="tab-btn" onclick="switchTab('analytics', this)">📊 Analytics</button>
    <button class="tab-btn" onclick="switchTab('announcements', this)">📢 Announcements</button>
    <button class="tab-btn" onclick="switchTab('drops', this)">📅 Scheduled Drops</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="container">
    <!-- PRODUCTS TAB -->
    <div id="tab-products" class="tab-content active">
      <div id="products-grid" class="product-grid"></div>
    </div>

    <!-- APPLICATIONS TAB -->
    <div id="tab-applications" class="tab-content">
      <div id="applications-list"></div>
    </div>

    <!-- MEMBERS TAB -->
    <div id="tab-members" class="tab-content">
      <div id="members-list"></div>
    </div>

    <!-- ANALYTICS TAB -->
    <div id="tab-analytics" class="tab-content">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h2 style="margin: 0; font-size: 1.1rem; font-weight: 700;">Analytics</h2>
        <button class="btn" onclick="sendWeeklyReport()">Send Weekly Report</button>
      </div>

      <div class="stats-grid" id="analytics-stats"></div>

      <div class="analytics-2col">
        <div class="card">
          <div class="card-title">Top Pages</div>
          <div id="top-pages-list"></div>
        </div>
        <div class="card">
          <div class="card-title">Top Products</div>
          <div id="top-products-list"></div>
        </div>
      </div>

      <div class="card analytics-full">
        <div class="card-title">Abandoned Carts</div>
        <div id="abandoned-carts-list"></div>
      </div>

      <div class="card analytics-full">
        <div class="card-title">Recent Activity</div>
        <div id="recent-activity-list"></div>
      </div>
    </div>

    <!-- ANNOUNCEMENTS TAB -->
    <div id="tab-announcements" class="tab-content">
      <div class="section-header">
        <div class="section-title">
          <h2>Product Announcements</h2>
          <p>Create pop-up announcements for new product drops</p>
        </div>
        <button class="btn" onclick="openAnnouncementModal()">+ New Announcement</button>
      </div>

      <div id="announcements-container"></div>
    </div>

    <!-- SCHEDULED DROPS TAB -->
    <div id="tab-drops" class="tab-content">
      <div class="section-header">
        <div class="section-title">
          <h2>Scheduled Drops</h2>
        </div>
        <button class="btn" onclick="openDropModal()">+ Schedule Drop</button>
      </div>

      <div id="drops-container"></div>
    </div>
  </div>

  <!-- MODALS -->
  <!-- Product Modal -->
  <div id="product-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center;">
    <div style="background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 10px; padding: 2rem; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto;">
      <h2 style="margin: 0 0 1.5rem 0; font-size: 1.2rem; font-weight: 700;">Add Product</h2>

      <label style="display: block; margin-bottom: 1rem;">
        <span style="display: block; font-size: 0.75rem; color: #777; margin-bottom: 0.3rem; text-transform: uppercase;">Product Name</span>
        <input id="prod-name" type="text" style="width: 100%; padding: 0.5rem; background: #111; border: 1px solid #2a2a2a; border-radius: 6px; color: #fff; font-family: 'Boldonse', sans-serif;">
      </label>

      <label style="display: block; margin-bottom: 1rem;">
        <span style="display: block; font-size: 0.75rem; color: #777; margin-bottom: 0.3rem; text-transform: uppercase;">Price</span>
        <input id="prod-price" type="number" step="0.01" style="width: 100%; padding: 0.5rem; background: #111; border: 1px solid #2a2a2a; border-radius: 6px; color: #fff; font-family: 'Boldonse', sans-serif;">
      </label>

      <label style="display: block; margin-bottom: 1rem;">
        <span style="display: block; font-size: 0.75rem; color: #777; margin-bottom: 0.3rem; text-transform: uppercase;">Description</span>
        <textarea id="prod-desc" style="width: 100%; padding: 0.5rem; background: #111; border: 1px solid #2a2a2a; border-radius: 6px; color: #fff; font-family: 'Boldonse', sans-serif; min-height: 80px;"></textarea>
      </label>

      <label style="display: block; margin-bottom: 1rem;">
        <span style="display: block; font-size: 0.75rem; color: #777; margin-bottom: 0.3rem; text-transform: uppercase;">Category</span>
        <input id="prod-category" type="text" style="width: 100%; padding: 0.5rem; background: #111; border: 1px solid #2a2a2a; border-radius: 6px; color: #fff; font-family: 'Boldonse', sans-serif;">
      </label>

      <label style="display: block; margin-bottom: 1rem;">
        <span style="display: block; font-size: 0.75rem; color: #777; margin-bottom: 0.3rem; text-transform: uppercase;">Stock</span>
        <input id="prod-stock" type="number" value="100" style="width: 100%; padding: 0.5rem; background: #111; border: 1px solid #2a2a2a; border-radius: 6px; color: #fff; font-family: 'Boldonse', sans-serif;">
      </label>

      <label style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; cursor: pointer;">
        <input id="prod-live" type="checkbox" style="width: 18px; height: 18px; cursor: pointer;">
        <span style="font-size: 0.75rem; color: #999;">Publish to Live Shop</span>
      </label>

      <div style="display: flex; gap: 0.8rem;">
        <button class="btn" onclick="saveProduct()" style="flex: 1;">Save Product</button>
        <button class="btn btn-outlined" onclick="closeModal('product-modal')" style="flex: 1;">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Drop Modal -->
  <div id="drop-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center;">
    <div style="background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 10px; padding: 2rem; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto;">
      <h2 style="margin: 0 0 1.5rem 0; font-size: 1.2rem; font-weight: 700;">Schedule Drop</h2>

      <label style="display: block; margin-bottom: 1rem;">
        <span style="display: block; font-size: 0.75rem; color: #777; margin-bottom: 0.3rem; text-transform: uppercase;">Product</span>
        <input id="drop-product" type="text" style="width: 100%; padding: 0.5rem; background: #111; border: 1px solid #2a2a2a; border-radius: 6px; color: #fff; font-family: 'Boldonse', sans-serif;">
      </label>

      <label style="display: block; margin-bottom: 1rem;">
        <span style="display: block; font-size: 0.75rem; color: #777; margin-bottom: 0.3rem; text-transform: uppercase;">Drop Date</span>
        <input id="drop-date" type="datetime-local" style="width: 100%; padding: 0.5rem; background: #111; border: 1px solid #2a2a2a; border-radius: 6px; color: #fff; font-family: 'Boldonse', sans-serif;">
      </label>

      <label style="display: block; margin-bottom: 1rem;">
        <span style="display: block; font-size: 0.75rem; color: #777; margin-bottom: 0.3rem; text-transform: uppercase;">Quantity</span>
        <input id="drop-quantity" type="number" value="100" style="width: 100%; padding: 0.5rem; background: #111; border: 1px solid #2a2a2a; border-radius: 6px; color: #fff; font-family: 'Boldonse', sans-serif;">
      </label>

      <div style="display: flex; gap: 0.8rem;">
        <button class="btn" onclick="scheduleDrop()" style="flex: 1;">Schedule</button>
        <button class="btn btn-outlined" onclick="closeModal('drop-modal')" style="flex: 1;">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDgpvF9rIy44h4whE7mon7m0mD-bV21kEg",
      authDomain: "dirtboxclub-3d7a7.firebaseapp.com",
      projectId: "dirtboxclub-3d7a7",
      storageBucket: "dirtboxclub-3d7a7.firebasestorage.app",
      messagingSenderId: "883493757389",
      appId: "1:883493757389:web:749f668e2655fd168fe484"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Hide page until auth confirmed
    document.body.style.visibility = 'hidden';

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location = 'admin-login.html';
        return;
      }
      document.body.style.visibility = 'visible';
      await initializeData();
      await refreshAllData();
    });

    const defaultProducts = [
      { name: 'Awkward Since Birth Tee', price: 35.00, desc: 'Express your personality', category: 'Apparel', stock: 100, image: 'assets/awkward-since-birth-tee.png' },
      { name: 'Born Defiant Tee', price: 35.00, desc: 'Stand out with confidence', category: 'Apparel', stock: 100, image: 'assets/born-defiant-tee.png' },

    async function initializeData() {
      const snap = await getDocs(collection(db, 'products'));
      if (snap.empty) {
        const batch = writeBatch(db);
        defaultProducts.forEach(p => {
          const ref = doc(collection(db, 'products'));
          batch.set(ref, { ...p, created: new Date().toISOString() });
        });
        await batch.commit();
      }
    }

    window.switchTab = function(tabName, btn) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tabName).classList.add('active');
      if (btn) btn.classList.add('active');
      document.getElementById('add-product-btn').style.display = tabName === 'products' ? 'block' : 'none';
      refreshAllData();
    };

    window.openProductModal = function() {
      document.getElementById('product-modal').style.display = 'flex';
    };

    window.openDropModal = function() {
      document.getElementById('drop-modal').style.display = 'flex';
    };

    window.openAnnouncementModal = function() {
      window.createAnnouncementCard();
    };

    window.closeModal = function(modalId) {
      document.getElementById(modalId).style.display = 'none';
    };

    window.saveProduct = async function() {
      const name = document.getElementById('prod-name').value.trim();
      const price = parseFloat(document.getElementById('prod-price').value);
      if (!name || !price) { alert('Name and price are required.'); return; }
      await addDoc(collection(db, 'products'), {
        name,
        desc: document.getElementById('prod-desc').value.trim(),
        price,
        category: document.getElementById('prod-category').value || 'Apparel',
        stock: parseInt(document.getElementById('prod-stock').value) || 100,
        live: document.getElementById('prod-live').checked,
        image: null,
        created: new Date().toISOString()
      });
      window.closeModal('product-modal');
      ['prod-name', 'prod-desc', 'prod-category'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('prod-price').value = '';
      document.getElementById('prod-stock').value = '100';
      document.getElementById('prod-live').checked = false;
      await refreshAllData();
    };

    window.deleteProduct = async function(id) {
      if (!confirm('Delete this product?')) return;
      await deleteDoc(doc(db, 'products', id));
      await refreshAllData();
    };

    window.scheduleDrop = async function() {
      const product = document.getElementById('drop-product').value.trim();
      const date = document.getElementById('drop-date').value;
      const quantity = parseInt(document.getElementById('drop-quantity').value);
      if (!product || !date || !quantity) { alert('All fields are required.'); return; }
      await addDoc(collection(db, 'drops'), {
        product, date, quantity,
        created: new Date().toISOString()
      });
      window.closeModal('drop-modal');
      document.getElementById('drop-product').value = '';
      document.getElementById('drop-date').value = '';
      document.getElementById('drop-quantity').value = '100';
      await refreshAllData();
    };

    async function refreshAllData() {
      await Promise.all([
        refreshProducts(),
        refreshApplications(),
        refreshMembers(),
        refreshAnnouncements(),
        refreshDrops()
      ]);
      refreshAnalytics();
    }

    async function refreshProducts() {
      const container = document.getElementById('products-grid');
      const snap = await getDocs(collection(db, 'products'));
      const products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (products.length === 0) {
        container.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1;"><div class="empty-icon">📦</div><div class="empty-title">No Products Yet</div></div>';
        return;
      }
      container.innerHTML = products.map(p => `
        <div class="product-card">
          <div class="product-image">
            ${p.image ? `<img src="${p.image}" alt="${p.name}">` : `<span>${p.name}</span>`}
          </div>
          <div class="product-info">
            <div class="product-header">
              <div class="product-name">${p.name}</div>
              <div class="product-price">£${parseFloat(p.price).toFixed(2)}</div>
            </div>
            <div class="product-desc">${p.desc || ''}</div>
            <div class="product-meta">
              <span>${p.category || 'Apparel'}</span>
              <span>Stock: ${p.stock || 0}</span>
            </div>
            <div class="product-actions">
              <button class="product-edit-btn">✏ Edit</button>
              <button class="btn-icon" onclick="alert('Email feature coming soon')">✉</button>
              <button class="btn-icon delete" onclick="deleteProduct('${p.id}')">🗑</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    async function refreshApplications() {
      const container = document.getElementById('applications-list');
      const snap = await getDocs(collection(db, 'applications'));
      const applications = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (applications.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No Applications Yet</div></div>';
        return;
      }
      container.innerHTML = applications.map(app => `
        <div class="application-card">
          <div class="application-header">
            <div>
              <div class="application-name">${app.name || '—'}</div>
              <div class="application-meta">${app.email || '—'}</div>
              <div class="application-meta">Quiz Result: ${app.quizResult || 'N/A'}</div>
            </div>
            <div class="application-actions">
              <button class="application-btn approve" onclick="approveApplication('${app.id}')">Approve</button>
              <button class="application-btn reject" onclick="rejectApplication('${app.id}')">Reject</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    window.approveApplication = async function(id) {
      const snap = await getDocs(collection(db, 'applications'));
      const appDoc = snap.docs.find(d => d.id === id);
      if (appDoc) {
        const appData = appDoc.data();
        await addDoc(collection(db, 'members'), {
          name: appData.name || '',
          email: appData.email || '',
          quizResult: appData.quizResult || '',
          tshirt_size: appData.tshirt_size || '',
          joined: new Date().toISOString()
        });
        await deleteDoc(doc(db, 'applications', id));
      }
      await refreshAllData();
    };

    window.rejectApplication = async function(id) {
      await deleteDoc(doc(db, 'applications', id));
      await refreshAllData();
    };

    async function refreshMembers() {
      const container = document.getElementById('members-list');
      const snap = await getDocs(collection(db, 'members'));
      const members = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (members.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">No Members Yet</div></div>';
        return;
      }
      container.innerHTML = members.map(m => {
        const joined = new Date(m.joined);
        const dateStr = isNaN(joined) ? '—' : joined.toLocaleDateString('en-GB');
        return `
          <div class="member-card">
            <div class="member-info">
              <div class="member-name">${m.name || m.email || '—'}</div>
              <div class="member-detail">${m.email || '—'}</div>
              <div class="member-detail">Joined: ${dateStr}</div>
            </div>
            <div class="member-icon">👤</div>
          </div>
        `;
      }).join('');
    }

    function refreshAnalytics() {
      document.getElementById('analytics-stats').innerHTML = `
        <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-label">Page Views</div><div class="stat-value">—</div></div>
        <div class="stat-card"><div class="stat-icon">👁</div><div class="stat-label">Unique Sessions</div><div class="stat-value">—</div></div>
        <div class="stat-card"><div class="stat-icon">⏱</div><div class="stat-label">Avg Time on Page</div><div class="stat-value">—</div></div>
        <div class="stat-card"><div class="stat-icon">🛒</div><div class="stat-label">Abandoned Carts</div><div class="stat-value">—</div></div>
      `;
      const placeholder = '<div class="empty-state" style="padding:1.5rem;"><div class="empty-desc" style="font-size:0.75rem;color:#777;">Analytics integration coming soon</div></div>';
      document.getElementById('top-pages-list').innerHTML = placeholder;
      document.getElementById('top-products-list').innerHTML = placeholder;
      document.getElementById('abandoned-carts-list').innerHTML = placeholder;
      document.getElementById('recent-activity-list').innerHTML = placeholder;
    }

    async function refreshAnnouncements() {
      const container = document.getElementById('announcements-container');
      const snap = await getDocs(collection(db, 'announcements'));
      const announcements = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (announcements.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📢</div>
            <div class="empty-title">No Announcements Yet</div>
            <div class="empty-desc">Create your first announcement to promote new products</div>
            <button class="btn" onclick="createAnnouncementCard()">Create Announcement</button>
          </div>
        `;
        return;
      }
      container.innerHTML = announcements.map(a => `
        <div class="card">
          <div class="card-title">${a.title || 'Announcement'}</div>
          <p style="color: #999; font-size: 0.75rem; margin-bottom: 1rem;">${a.content}</p>
          <button class="btn-icon delete" onclick="deleteAnnouncement('${a.id}')">🗑</button>
        </div>
      `).join('');
    }

    window.createAnnouncementCard = async function() {
      const text = prompt('Enter announcement text:');
      if (!text) return;
      await addDoc(collection(db, 'announcements'), {
        title: 'New Announcement',
        content: text,
        created: new Date().toISOString()
      });
      await refreshAllData();
    };

    window.deleteAnnouncement = async function(id) {
      await deleteDoc(doc(db, 'announcements', id));
      await refreshAllData();
    };

    async function refreshDrops() {
      const container = document.getElementById('drops-container');
      const snap = await getDocs(collection(db, 'drops'));
      const drops = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (drops.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📅</div>
            <div class="empty-title">No Scheduled Drops Yet</div>
            <div class="empty-desc">Create a drop to build anticipation among your members</div>
          </div>
        `;
        return;
      }
      container.innerHTML = drops.map(d => `
        <div class="card">
          <div class="card-title">${d.product}</div>
          <div style="font-size: 0.75rem; color: #777; margin-bottom: 1rem;">
            <div>Date: ${new Date(d.date).toLocaleString()}</div>
            <div>Quantity: ${d.quantity}</div>
          </div>
          <button class="btn-icon delete" onclick="deleteDrop('${d.id}')">🗑</button>
        </div>
      `).join('');
    }

    window.deleteDrop = async function(id) {
      if (!confirm('Delete this drop?')) return;
      await deleteDoc(doc(db, 'drops', id));
      await refreshAllData();
    };

    window.sendWeeklyReport = function() {
      alert('Weekly report would be sent via email.');
    };

    window.logout = async function() {
      await signOut(auth);
      window.location = 'admin-login.html';
    };
  </script>
